services:
  app:
    build: { context: ., target: development }
    volumes: [".:/var/www/html"]
    environment: { DB_HOST: mysql, REDIS_HOST: redis }
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_healthy } }
  nginx:
    image: nginx:1.27-alpine
    ports: ["${APP_PORT:-8080}:80"]
    volumes: [".:/var/www/html:ro", "./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [app]
  mysql:
    image: mysql:8.4
    environment: { MYSQL_DATABASE: school_management, MYSQL_ROOT_PASSWORD: root }
    ports: ["${FORWARD_DB_PORT:-3307}:3306"]
    volumes: ["mysql-data:/var/lib/mysql"]
    healthcheck: { test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"], interval: 5s, timeout: 5s, retries: 20 }
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 5s, retries: 20 }
  queue:
    build: { context: ., target: development }
    command: php artisan queue:work --tries=3
    volumes: [".:/var/www/html"]
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_healthy } }
  scheduler:
    build: { context: ., target: development }
    command: php artisan schedule:work
    volumes: [".:/var/www/html"]
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_healthy } }
  mailpit:
    image: axllent/mailpit:latest
    ports: ["${FORWARD_MAILPIT_PORT:-8026}:8025"]
volumes: { mysql-data: {} }
